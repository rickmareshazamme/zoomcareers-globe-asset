<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zoom Globe Slider</title>
<style>
@font-face { font-family: "AlmadenSans"; font-weight: 400; font-display: swap;
  src: url("https://cdn.jsdelivr.net/gh/rickmareshazamme/zoomcareers-globe-asset@main/assets/fonts/almaden-sans/AlmadenSans-Regular-WebXL.woff2") format("woff2"); }
@font-face { font-family: "AlmadenSans"; font-weight: 500; font-display: swap;
  src: url("https://cdn.jsdelivr.net/gh/rickmareshazamme/zoomcareers-globe-asset@main/assets/fonts/almaden-sans/AlmadenSans-Book-WebXL.woff2") format("woff2"); }
@font-face { font-family: "AlmadenSans"; font-weight: 600; font-display: swap;
  src: url("https://cdn.jsdelivr.net/gh/rickmareshazamme/zoomcareers-globe-asset@main/assets/fonts/almaden-sans/AlmadenSans-SemiBold-WebXL.woff2") format("woff2"); }
@font-face { font-family: "HappyDisplay"; font-weight: 400; font-display: swap;
  src: url("https://cdn.jsdelivr.net/gh/rickmareshazamme/zoomcareers-globe-asset@main/assets/fonts/happy-display/HappyDisplay-Regular.woff2") format("woff2"); }
@font-face { font-family: "HappyDisplay"; font-weight: 600; font-display: swap;
  src: url("https://cdn.jsdelivr.net/gh/rickmareshazamme/zoomcareers-globe-asset@main/assets/fonts/happy-display/HappyDisplay-SemiBold.woff2") format("woff2"); }
@font-face { font-family: "HappyDisplay"; font-weight: 700; font-display: swap;
  src: url("https://cdn.jsdelivr.net/gh/rickmareshazamme/zoomcareers-globe-asset@main/assets/fonts/happy-display/HappyDisplay-Bold.woff2") format("woff2"); }
</style>
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/Draggable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/InertiaPlugin.min.js"></script>
<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
    }
}
</script>
</head>
<body>
<div style="position:fixed;bottom:300px;right:40px;z-index:2147483647;display:flex;flex-direction:row;gap:12px">
  <button onclick="document.querySelector('.globe-slider .prev')?.click()" aria-label="Previous" style="all:unset;cursor:pointer;width:60px;height:60px;display:flex;align-items:center;justify-content:center;background:#D7E6FC;border-radius:14px">
    <svg width="40" height="40" viewBox="0 0 60 60" fill="none"><path d="M35 17L20 29.5L35 42" stroke="#0B5CFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button onclick="document.querySelector('.globe-slider .next')?.click()" aria-label="Next" style="all:unset;cursor:pointer;width:60px;height:60px;display:flex;align-items:center;justify-content:center;background:#0B5CFF;border-radius:14px">
    <svg width="40" height="40" viewBox="0 0 60 60" fill="none"><path d="M25 42L40 29.5L25 17" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>
<div style="position:absolute;top:60px;left:5%;max-width:520px;z-index:5;font-family:'AlmadenSans','Helvetica Neue',Arial,sans-serif;color:#0B1530;pointer-events:none">
  <p style="margin:0 0 16px;color:#2661FF;font-weight:600;font-size:20px;font-family:'AlmadenSans','Helvetica Neue',Arial,sans-serif">Our Locations</p>
  <h2 style="margin:0 0 28px;font-family:'HappyDisplay','AlmadenSans','Helvetica Neue',Arial,sans-serif;font-weight:700;font-size:clamp(36px,4vw,52px);line-height:1.05;letter-spacing:-0.01em;color:#0B1530">Imagine what you can do&mdash;<span style="color:#2874FC">worldwide</span></h2>
  <p style="margin:0;font-size:18px;line-height:1.5;color:#0B1530;font-family:'AlmadenSans','Helvetica Neue',Arial,sans-serif">From San Jose to Singapore, Zoomies are helping people work happy around the world. Ready to join us? Find your fit and apply today.</p>
</div>
<section class="globe-slider-section">
    <div class="globe-slider">
        <div class="globe-container">
            <div class="globe-wrapper">
                <canvas id="globe-3d"></canvas>
                <div id="globe-popups-overlay"></div>
            </div>

            <div class="slider-btns">
                <button class="prev" aria-label="Previous">
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" fill="none">
                        <rect width="60" height="60" rx="13" fill="#D7E6FC" />
                        <path d="M35 17L20 29.5L35 42" stroke="#0B5CFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <button class="next" aria-label="Next">
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" fill="none">
                        <rect width="60" height="60" rx="13" fill="#0B5CFF" />
                        <path d="M25 42L40 29.5L25 17" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>

            <div id="slider-wrapper"></div>
            <div id="dummy-list"></div>
        </div>
    </div>
</section>
<script type="module" src="script.js"></script>
</body>
</html>
